{% extends "base.html" %}
{% block content %}
<div style="text-align:center;padding:10px 0 24px">
    <h1 class="font-display" style="font-size:1.4rem;font-weight:800;color:var(--neon-secondary);text-shadow:0 0 10px rgba(255,107,155,0.4)">GENERATOR OPISÓW AI</h1>
    <small style="color:var(--text-muted);font-size:0.82rem">Automatyczne opisy produktów</small>
</div>

<form method="POST" action="/narzedzia/generator">
<div class="glass-card" style="padding:24px;margin-bottom:20px">
    <div class="form-group">
        <label>📝 Nazwa produktu</label>
        <input type="text" name="nazwa" class="form-control" value="{{ nazwa or '' }}" placeholder="np. Pokrowce na siedzenia Coverado" required>
    </div>
    <div class="form-group">
        <label>📁 Kategoria</label>
        <select name="kategoria" class="form-control">
            <option value="motoryzacja" {{ 'selected' if kategoria=='motoryzacja' else '' }}>🚗 Motoryzacja</option>
            <option value="elektronika" {{ 'selected' if kategoria=='elektronika' else '' }}>📷 Elektronika</option>
            <option value="inne" {{ 'selected' if kategoria=='inne' or not kategoria else '' }}>📦 Inne</option>
        </select>
    </div>
    <button type="submit" class="btn" style="background:rgba(255,107,155,0.12);border:1px solid rgba(255,107,155,0.3);color:var(--neon-secondary);font-weight:700">✨ GENERUJ OPIS</button>
</div>
</form>

{% if opis %}
<div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--neon-tertiary);text-shadow:0 0 8px rgba(190,238,0,0.3);margin-bottom:12px;font-weight:600">📄 Wygenerowany opis</div>
<div class="glass-card" style="padding:20px;white-space:pre-wrap;font-size:0.95rem;line-height:1.7;max-height:280px;overflow-y:auto;margin-bottom:16px">{{ opis }}</div>
<button onclick="navigator.clipboard.writeText(document.querySelector('.glass-card:last-of-type').innerText);alert('Skopiowano!')" class="btn" style="background:rgba(190,238,0,0.12);border:1px solid rgba(190,238,0,0.3);color:var(--neon-tertiary);font-weight:700">📋 KOPIUJ DO SCHOWKA</button>
{% endif %}

<a href="/narzedzia" class="back">← Powrót</a>
{% endblock %}
