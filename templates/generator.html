{% extends "base.html" %}
{% block content %}
<div class="header">
    <h1>✨ GENERATOR OPISÓW AI</h1>
    <small>Automatyczne opisy produktów</small>
</div>

<form method="POST" action="/narzedzia/generator">
<div class="card">
    <div class="form-group">
        <label>📝 Nazwa produktu</label>
        <input type="text" name="nazwa" class="form-control" value="{{ nazwa or '' }}" placeholder="np. Pokrowce na siedzenia Coverado" required>
    </div>
    <div class="form-group">
        <label>📁 Kategoria</label>
        <select name="kategoria" class="form-control">
            <option value="motoryzacja" {{ 'selected' if kategoria=='motoryzacja' else '' }}>🚗 Motoryzacja</option>
            <option value="elektronika" {{ 'selected' if kategoria=='elektronika' else '' }}>📷 Elektronika</option>
            <option value="inne" {{ 'selected' if kategoria=='inne' or not kategoria else '' }}>📦 Inne</option>
        </select>
    </div>
    <button type="submit" class="btn btn-purple">✨ GENERUJ OPIS</button>
</div>
</form>

{% if opis %}
<div class="section-title" style="color:#22c55e">📄 Wygenerowany opis:</div>
<div class="opis-box">{{ opis }}</div>
<button onclick="navigator.clipboard.writeText(document.querySelector('.opis-box').innerText);alert('Skopiowano!')" class="btn btn-success">📋 KOPIUJ DO SCHOWKA</button>
{% endif %}

<a href="/narzedzia" class="back">← Powrót</a>
{% endblock %}
