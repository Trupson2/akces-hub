{% extends "base.html" %}
{% block content %}
<style>
.cl-container{max-width:640px;margin:0 auto;padding:20px 16px}
.cl-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.cl-header h1{font-size:1.3rem;margin:0;display:flex;align-items:center;gap:8px}
.cl-back{color:#64748b;text-decoration:none;font-size:0.85rem}
.cl-back:hover{color:#e2e8f0}
.cl-section{margin-bottom:24px}
.cl-date{font-size:0.95rem;font-weight:700;color:#6366f1;margin:20px 0 6px;padding-top:16px;border-top:1px solid #1e293b}
.cl-date:first-of-type{border-top:none;padding-top:0}
.cl-category{font-size:0.82rem;font-weight:700;color:#94a3b8;margin:14px 0 6px;display:flex;align-items:center;gap:6px}
.cl-item{font-size:0.84rem;color:#cbd5e1;padding:6px 0 6px 16px;border-left:2px solid #1e293b;margin:2px 0;line-height:1.5}
.cl-item:hover{border-left-color:#6366f1}
.cl-tag{display:inline-block;font-size:0.62rem;padding:1px 6px;border-radius:5px;font-weight:700;margin-right:4px;vertical-align:middle}
.tag-new{background:rgba(34,197,94,.15);color:#22c55e}
.tag-fix{background:rgba(239,68,68,.15);color:#ef4444}
.tag-sec{background:rgba(234,179,8,.15);color:#eab308}
.tag-opt{background:rgba(59,130,246,.15);color:#3b82f6}
.tag-other{background:rgba(100,116,139,.15);color:#94a3b8}
.cl-sep{border:none;border-top:1px solid #1e293b;margin:20px 0}
</style>

<div class="cl-container">
<div class="cl-header">
    <h1>📋 Historia zmian</h1>
    <a href="/" class="cl-back">← Dashboard</a>
</div>

<div id="changelog-content"></div>
</div>

<script>
const raw = {{ content|tojson }};
const container = document.getElementById('changelog-content');
let html = '';
const lines = raw.split('\n');

for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line || line === '---') continue;

    // # Tytuł — pomijamy
    if (line.startsWith('# ') && !line.startsWith('## ') && !line.startsWith('### ')) continue;

    // ## Data
    if (line.startsWith('## ')) {
        const dateText = line.replace('## ', '');
        html += '<div class="cl-date">' + dateText + '</div>';
        continue;
    }

    // ### Kategoria
    if (line.startsWith('### ')) {
        const cat = line.replace('### ', '');
        let icon = '📌';
        const cl = cat.toLowerCase();
        if (cl.includes('bezpiecz') || cl.includes('security')) icon = '🔒';
        else if (cl.includes('nowe') || cl.includes('integr')) icon = '✨';
        else if (cl.includes('napraw') || cl.includes('fix')) icon = '🔧';
        else if (cl.includes('optym') || cl.includes('wydaj')) icon = '⚡';
        else if (cl.includes('system') || cl.includes('backup')) icon = '🖥️';
        else if (cl.includes('szablon') || cl.includes('template')) icon = '🎨';
        else if (cl.includes('logowa')) icon = '🔑';
        else if (cl.includes('poziom') || cl.includes('grywaliz')) icon = '🎮';
        else if (cl.includes('inne')) icon = '📝';
        html += '<div class="cl-category">' + icon + ' ' + cat + '</div>';
        continue;
    }

    // - Element
    if (line.startsWith('- ')) {
        let text = line.substring(2);
        let tag = '<span class="cl-tag tag-other">ZMIANA</span>';
        const tl = text.toLowerCase();
        if (tl.includes('dodano') || tl.includes('nowy') || tl.includes('nowe') || text.startsWith('**Nowe**')) {
            tag = '<span class="cl-tag tag-new">NOWE</span>';
        } else if (tl.includes('napraw') || tl.includes('blad') || tl.includes('poprawka') || text.startsWith('**Naprawiono**')) {
            tag = '<span class="cl-tag tag-fix">FIX</span>';
        } else if (tl.includes('bezpiecz') || tl.includes('csrf') || tl.includes('injection') || tl.includes('bandit')) {
            tag = '<span class="cl-tag tag-sec">SECURITY</span>';
        } else if (tl.includes('optym') || tl.includes('wydaj') || tl.includes('usuniet') || tl.includes('skroc')) {
            tag = '<span class="cl-tag tag-opt">OPTYM.</span>';
        }
        // Pogrubienie **text**
        text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        html += '<div class="cl-item">' + tag + ' ' + text + '</div>';
        continue;
    }
}

container.innerHTML = html;
</script>
{% endblock %}
