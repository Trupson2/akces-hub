{% extends "base.html" %}
{% block content %}
<div style="text-align:center;padding:10px 0 24px">
    <h1 class="font-display" style="font-size:1.4rem;font-weight:800;color:var(--neon-primary);text-shadow:0 0 10px rgba(143,245,255,0.4)">POWIADOMIENIA</h1>
</div>

{% for n in notyfikacje %}
<div class="glass-card" style="display:flex;align-items:center;gap:12px;padding:16px;margin-bottom:10px;border-left:3px solid {{ 'var(--neon-tertiary)' if n.type == 'sale' else 'var(--yellow)' }}">
    <div style="font-size:1.5rem">{{ '<span class="material-symbols-outlined" style="font-size:1rem;vertical-align:middle">paid</span>' if n.type == 'sale' else '<span class="material-symbols-outlined" style="font-size:1rem;vertical-align:middle">warning</span>' }}</div>
    <div style="flex:1">
        <div style="font-weight:600">{{ n.msg }}</div>
        <div style="font-size:0.75rem;color:var(--text-muted)">{{ n.time }}</div>
    </div>
</div>
{% endfor %}

{% if not notyfikacje %}
<div class="glass-card" style="text-align:center;padding:40px">
    <div style="font-size:3rem;margin-bottom:15px;filter:drop-shadow(0 0 10px rgba(143,245,255,0.3))"><span class="material-symbols-outlined" style="font-size:1rem;vertical-align:middle">notifications</span></div>
    <div style="color:var(--text-muted)">Brak nowych powiadomień</div>
</div>
{% endif %}

<a href="/" class="back">← Powrót</a>
{% endblock %}
