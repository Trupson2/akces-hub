<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0a0a0f">
<title>Offline - {{ brand_name|default('Akces Hub') }}</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui;background:#0a0a0f;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{text-align:center;max-width:400px}
.icon{font-size:4rem;margin-bottom:20px}
h1{font-size:1.5rem;color:#3b82f6;margin-bottom:10px}
p{color:#64748b;margin-bottom:20px;line-height:1.6}
.btn{display:inline-block;padding:12px 24px;background:#3b82f6;color:#fff;text-decoration:none;border-radius:10px;font-weight:600}
.status{margin-top:30px;padding:15px;background:#12121a;border-radius:10px}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#ef4444;margin-right:8px}
</style>
</head>
<body>
<div class="box">
    <div class="icon">📡</div>
    <h1>Brak połączenia</h1>
    <p>Nie można połączyć się z serwerem. Sprawdź połączenie sieciowe i spróbuj ponownie.</p>
    <a href="/dashboard" class="btn" onclick="window.location.reload();return false;"><span class="material-symbols-outlined" style="font-size:inherit;vertical-align:middle">sync</span> Spróbuj ponownie</a>
    <div class="status">
        <span class="status-dot"></span>
        <span style="color:#94a3b8;font-size:0.85rem">Tryb offline</span>
    </div>
</div>
<script nonce="{{ csp_nonce }}">
// Auto-retry co 5 sekund
setInterval(()=>{
    fetch('/api/stats').then(r=>{if(r.ok)window.location.reload();}).catch(()=>{});
},5000);
</script>
</body>
</html>
