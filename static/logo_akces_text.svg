<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 100" width="440" height="100">
  <defs>
    <filter id="glowCyan" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#8ff5ff" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowPink" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#ff6b9b" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8ff5ff"/>
      <stop offset="60%" stop-color="#8ff5ff"/>
      <stop offset="100%" stop-color="#b0f8ff"/>
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b9b"/>
      <stop offset="100%" stop-color="#ff4081"/>
    </linearGradient>

    <!-- Clip for the stylized A cutout -->
    <clipPath id="aClip">
      <rect x="0" y="0" width="440" height="100"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="440" height="100" rx="8" fill="#0e0e10"/>

  <!-- Decorative horizontal scan lines -->
  <line x1="0" y1="25" x2="440" y2="25" stroke="#8ff5ff" stroke-width="0.3" opacity="0.05"/>
  <line x1="0" y1="50" x2="440" y2="50" stroke="#8ff5ff" stroke-width="0.3" opacity="0.05"/>
  <line x1="0" y1="75" x2="440" y2="75" stroke="#8ff5ff" stroke-width="0.3" opacity="0.05"/>

  <!-- === CUSTOM LETTER PATHS for "AKCES" === -->
  <g transform="translate(20, 14)" filter="url(#glowCyan)">

    <!-- Letter A - stylized with gear-tooth crossbar -->
    <g fill="url(#textGrad)">
      <!-- A outer shape -->
      <path d="M 42,68 L 0,68 L 32,0 L 52,0 L 84,68 L 68,68 L 60,50 L 24,50 L 16,68 Z
               M 28,38 L 56,38 L 42,8 Z"/>
      <!-- Small gear tooth notches on the A crossbar -->
      <rect x="30" y="36" width="4" height="6" rx="0.5" fill="#ff6b9b" opacity="0.7"/>
      <rect x="50" y="36" width="4" height="6" rx="0.5" fill="#ff6b9b" opacity="0.7"/>
    </g>

    <!-- Letter K -->
    <g fill="url(#textGrad)" transform="translate(90, 0)">
      <path d="M 0,0 L 16,0 L 16,26 L 48,0 L 68,0 L 34,28 L 70,68 L 50,68 L 22,36 L 16,41 L 16,68 L 0,68 Z"/>
    </g>

    <!-- Letter C -->
    <g fill="url(#textGrad)" transform="translate(168, 0)">
      <path d="M 56,0 L 56,14 L 30,14 Q 16,14 16,28 L 16,40 Q 16,54 30,54 L 56,54 L 56,68 L 28,68
               Q 0,68 0,42 L 0,26 Q 0,0 28,0 Z"/>
    </g>

    <!-- Letter E -->
    <g fill="url(#textGrad)" transform="translate(234, 0)">
      <path d="M 0,0 L 52,0 L 52,14 L 16,14 L 16,28 L 46,28 L 46,40 L 16,40 L 16,54 L 54,54 L 54,68 L 0,68 Z"/>
      <!-- Pink accent dot on E middle bar -->
      <circle cx="48" cy="34" r="2" fill="#ff6b9b" filter="url(#glowPink)"/>
    </g>

    <!-- Letter S -->
    <g fill="url(#textGrad)" transform="translate(298, 0)">
      <path d="M 52,0 L 52,14 L 26,14 Q 16,14 16,24 L 16,26 Q 16,32 26,32 L 36,32
               Q 56,32 56,50 L 56,54 Q 56,68 36,68 L 0,68 L 0,54 L 34,54 Q 40,54 40,46 L 40,44
               Q 40,38 30,38 L 22,38 Q 0,38 0,20 L 0,16 Q 0,0 20,0 Z"/>
    </g>
  </g>

  <!-- Decorative underline -->
  <line x1="20" y1="88" x2="400" y2="88" stroke="#8ff5ff" stroke-width="0.8" opacity="0.12"/>
  <line x1="20" y1="88" x2="100" y2="88" stroke="url(#pinkGrad)" stroke-width="1.5" opacity="0.5"/>
  <circle cx="100" cy="88" r="2" fill="#ff6b9b" opacity="0.5"/>

  <!-- Corner accents -->
  <path d="M 6,3 L 3,3 L 3,6" fill="none" stroke="#8ff5ff" stroke-width="0.8" opacity="0.2"/>
  <path d="M 434,3 L 437,3 L 437,6" fill="none" stroke="#8ff5ff" stroke-width="0.8" opacity="0.2"/>
  <path d="M 6,97 L 3,97 L 3,94" fill="none" stroke="#8ff5ff" stroke-width="0.8" opacity="0.2"/>
  <path d="M 434,97 L 437,97 L 437,94" fill="none" stroke="#ff6b9b" stroke-width="0.8" opacity="0.25"/>
</svg>