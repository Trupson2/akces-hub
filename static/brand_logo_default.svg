<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <g transform="translate(64, 64)">
    <!-- Outer gear ring -->
    <circle cx="0" cy="0" r="44" fill="none" stroke="#8ff5ff" stroke-width="2.5"/>
    <!-- Gear teeth (8) -->
    <g fill="#8ff5ff">
      <rect x="-3.5" y="-50" width="7" height="10" rx="1.5"/>
      <rect x="-3.5" y="40" width="7" height="10" rx="1.5"/>
      <rect x="40" y="-3.5" width="10" height="7" rx="1.5"/>
      <rect x="-50" y="-3.5" width="10" height="7" rx="1.5"/>
      <rect x="26" y="-37" width="7" height="10" rx="1.5" transform="rotate(45, 29.5, -32)"/>
      <rect x="-33" y="-37" width="7" height="10" rx="1.5" transform="rotate(-45, -29.5, -32)"/>
      <rect x="26" y="27" width="7" height="10" rx="1.5" transform="rotate(-45, 29.5, 32)"/>
      <rect x="-33" y="27" width="7" height="10" rx="1.5" transform="rotate(45, -29.5, 32)"/>
    </g>
    <!-- Inner wheel -->
    <circle cx="0" cy="0" r="28" fill="none" stroke="#8ff5ff" stroke-width="0.8" opacity="0.4"/>
    <!-- Spokes -->
    <line x1="0" y1="-28" x2="0" y2="-12" stroke="#8ff5ff" stroke-width="0.8" opacity="0.5"/>
    <line x1="0" y1="28" x2="0" y2="12" stroke="#8ff5ff" stroke-width="0.8" opacity="0.5"/>
    <line x1="-24" y1="14" x2="-10" y2="6" stroke="#8ff5ff" stroke-width="0.8" opacity="0.5"/>
    <line x1="24" y1="14" x2="10" y2="6" stroke="#8ff5ff" stroke-width="0.8" opacity="0.5"/>
    <line x1="-24" y1="-14" x2="-10" y2="-6" stroke="#8ff5ff" stroke-width="0.8" opacity="0.5"/>
    <line x1="24" y1="-14" x2="10" y2="-6" stroke="#8ff5ff" stroke-width="0.8" opacity="0.5"/>
    <!-- Hub -->
    <circle cx="0" cy="0" r="4" fill="none" stroke="#8ff5ff" stroke-width="2"/>
    <!-- Stylized A -->
    <path d="M 0,-26 L -17,19 L -11,19 L -7.5,7 L 7.5,7 L 11,19 L 17,19 Z M -5,1.5 L 5,1.5 L 0,-15 Z" fill="#8ff5ff"/>
    <!-- Pink accents -->
    <circle cx="31" cy="-31" r="2.5" fill="#ff6b9b"/>
    <circle cx="-31" cy="31" r="2.5" fill="#ff6b9b"/>
  </g>
</svg>
